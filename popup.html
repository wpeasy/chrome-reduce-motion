<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reduced Motion Toggle</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');

    :root {
      --bg:         #0e0e0e;
      --surface:    #161616;
      --border:     #262626;
      --text:       #d4d4d4;
      --text-dim:   #555;
      --accent:     #a8ff78;
      --accent-dim: #4a7a34;
      --danger:     #ff5555;
      --toggle-off: #2a2a2a;
      --radius:     2px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 11px;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header svg { opacity: 0.5; flex-shrink: 0; }
    .header-title {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .section-label {
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 10px 14px 6px;
    }

    .origin-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      min-height: 36px;
    }
    .origin-row:last-child { border-bottom: none; }
    .origin-row.current { background: var(--surface); }

    .origin-left {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .status-dot.active {
      background: var(--accent);
      box-shadow: 0 0 5px var(--accent);
    }

    .origin-name {
      font-size: 10.5px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--toggle-off);
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid #333;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 2px;
      top: 2px;
      background: #555;
      border-radius: 1px;
      transition: transform 0.18s, background 0.18s;
    }
    input:checked + .slider { background: #1a3019; border-color: var(--accent-dim); }
    input:checked + .slider::before { transform: translateX(16px); background: var(--accent); }
    input:disabled + .slider { opacity: 0.3; cursor: not-allowed; }

    .divider { border-top: 1px solid var(--border); }

    #others-section { max-height: 180px; overflow-y: auto; }
    #others-section::-webkit-scrollbar { width: 3px; }
    #others-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state {
      padding: 10px 14px 12px;
      font-size: 10px;
      color: var(--text-dim);
    }

    .footer {
      padding: 9px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .note { font-size: 9px; color: var(--text-dim); }

    #clear-all {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #clear-all:hover { border-color: var(--danger); color: var(--danger); }

    .mode-bar {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .mode-label {
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .mode-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .mode-btn {
      background: var(--toggle-off);
      border: none;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 9px;
      padding: 3px 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mode-btn + .mode-btn { border-left: 1px solid var(--border); }
    .mode-btn.active {
      background: #1a3019;
      color: var(--accent);
    }
    .mode-hint {
      padding: 4px 14px 6px;
      font-size: 8.5px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <div class="header">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="6.5" stroke="#666" stroke-width="1"/>
      <path d="M8 4v4l2.5 2.5" stroke="#666" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M4.5 4.5L3 3M11.5 4.5L13 3M8 2.5V1" stroke="#666" stroke-width="1" stroke-linecap="round"/>
    </svg>
    <span class="header-title">Reduced Motion</span>
  </div>

  <div class="mode-bar">
    <span class="mode-label">Mode</span>
    <div class="mode-toggle">
      <button class="mode-btn" data-mode="debugger">Emulate</button>
      <button class="mode-btn active" data-mode="css">CSS Override</button>
    </div>
  </div>
  <div class="mode-hint" id="mode-hint">Overrides animations with injected stylesheet</div>

  <div class="section-label">Current tab</div>
  <div class="origin-row current" id="current-row">
    <div class="origin-left">
      <span class="status-dot" id="current-dot"></span>
      <span class="origin-name" id="current-origin">—</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="current-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="divider"></div>
  <div id="others-section">
    <div class="section-label">Other origins</div>
    <div id="others-list"></div>
  </div>

  <div class="footer">
    <span class="note">Per-origin · persists on reload</span>
    <button id="clear-all">Clear all</button>
  </div>

  <script src="constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
